<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>초등 단원평가 문항 생성기</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .question-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; }
    .controls { margin-top: 10px; }
    button { margin-right: 5px; }
  </style>
</head>
<body>
  <h1>초등 단원평가 문항 생성기</h1>
  
  <!-- PDF 업로드 -->
  <input type="file" id="pdfUpload" accept=".pdf">
  <button onclick="extractPDF()">추출하기</button>
  
  <h2>문항 리스트</h2>
  <div id="questions"></div>
  
  <!-- 결과물 내보내기 -->
  <div class="controls">
    <button onclick="downloadTxt()">TXT 다운로드</button>
    <button onclick="downloadWord()">Word 다운로드</button>
  </div>
  
  <script>
    // 예시 문항 데이터 (실제 구현에서는 PDF 추출 결과로 대체)
    let questions = [
      {
        meta: "^^5지 / 100, , , / 22SCE62013 / 62013, 100 / / / 3\nL01-1-1",
        text: "(문제)전구에 불이 켜지는 전기 회로의 특징으로 알맞은 것은 어느 것인가요?",
        options: [
          "① 전구가 전지의 한쪽 극에만 연결되어 있습니다.",
          "② 전지, 전구, 전선이 끊기지 않게 연결되어 있습니다.",
          "③ 전구가 연결되지 않아도 불이 켜집니다.",
          "④ 전선이 연결되지 않아도 불이 켜집니다.",
          "⑤ 전구의 꼭지와 꼭지쇠가 같은 극에 연결되어 있습니다."
        ],
        answer: "(정답)②",
        explanation: "(해설)\n전구에 불이 켜지려면 전지, 전구, 전선이 끊기지 않게 연결되어야 하고 전구의 꼭지와 꼭지쇠가 전지의 (+)극과 (-)극에 각각 연결되어야 합니다."
      }
    ];
    
    function renderQuestions() {
      const container = document.getElementById("questions");
      container.innerHTML = "";
      questions.forEach((q, idx) => {
        let card = document.createElement("div");
        card.className = "question-card";
        card.innerHTML = `
          <pre>${q.meta}</pre>
          <p>${q.text}</p>
          ${q.options.map(o => `<p>${o}</p>`).join("")}
          <p>${q.answer}</p>
          <p>${q.explanation}</p>
          <div class="controls">
            <button onclick="regenerate(${idx})">재생성</button>
          </div>
        `;
        container.appendChild(card);
      });
    }
    
    function regenerate(index) {
      // 실제 구현에서는 AI 호출로 해당 문항만 다시 생성
      alert("문항 " + (index+1) + " 재생성 기능 (예시)");
    }
    
    function downloadTxt() {
      let content = questions.map(q => 
        `${q.meta}\n${q.text}\n${q.options.join("\n")}\n${q.answer}\n${q.explanation}`
      ).join("\n\n");
      let blob = new Blob([content], { type: "text/plain;charset=utf-8" });
      let link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "questions.txt";
      link.click();
    }
    
    function downloadWord() {
      let content = questions.map(q => 
        `${q.meta}\n${q.text}\n${q.options.join("\n")}\n${q.answer}\n${q.explanation}`
      ).join("\n\n");
      let blob = new Blob([content], { type: "application/msword" });
      let link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "questions.doc";
      link.click();
    }
    
    function extractPDF() {
      // 실제 구현에서는 서버 연동 필요
      alert("PDF 추출 기능은 서버 연동 필요 (예시)");
      renderQuestions();
    }
    
    renderQuestions();
  </script>
</body>
</html>
